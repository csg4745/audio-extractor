name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq build-essential git zip unzip \
          autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libltdl-dev \
          default-jdk
        pip install buildozer cython virtualenv

    - name: 设置 JAVA_HOME
      run: echo "JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64" >> $GITHUB_ENV

    - name: 运行智能构建脚本
      run: python3 smart_build.py

    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: audio-extractor-apk
        path: bin/*.apk

    - name: 创建 Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.1.0
        name: 音频提取器 v1.1.0
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
